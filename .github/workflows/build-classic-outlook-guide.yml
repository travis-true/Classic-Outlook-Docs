name: Build Classic Outlook employee guide

on:
  push:
    branches: [ "**" ]
  pull_request:
  workflow_dispatch:

jobs:
  build-guide:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r build/requirements.txt
      - name: Build employee guide DOCX and reports
        run: python3 build/build_classic_outlook_employee_guide.py
      - name: Upload guide artifacts
        uses: actions/upload-artifact@v4
        with:
          name: classic-outlook-employee-guide
          path: |
            docs/training/Take-Control-of-Your-Inbox_Classic-Outlook-for-Windows.md
            build/output/Take-Control-of-Your-Inbox_Classic-Outlook-for-Windows_v1.0.docx
            build/output/Take-Control-of-Your-Inbox_Classic-Outlook-for-Windows_Build-Report_v1.0.md
            build/output/Take-Control-of-Your-Inbox_Classic-Outlook-for-Windows_Validation_v1.0.md
            build/output/Take-Control-of-Your-Inbox_Classic-Outlook-for-Windows_Unresolved-Items_v1.0.md
            build/output/Take-Control-of-Your-Inbox_Classic-Outlook-for-Windows_Source-Inventory_v1.0.csv
