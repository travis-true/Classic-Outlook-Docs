name: Build Asset 01 Classic Outlook task map

on:
  workflow_dispatch:
  push:
    paths:
      - 'assets/01-task-map/**'
      - 'build/build_asset_01_task_map.py'
      - 'build/requirements.txt'
      - '*.md'
      - 'docs/training/**/*.md'
      - 'OFFICIAL BCBSKS PRIMARY LOGO.png'
  pull_request:
    paths:
      - 'assets/01-task-map/**'
      - 'build/build_asset_01_task_map.py'
      - 'build/requirements.txt'
      - '*.md'
      - 'docs/training/**/*.md'
      - 'OFFICIAL BCBSKS PRIMARY LOGO.png'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: python -m pip install -r build/requirements.txt
      - name: Build and validate asset
        run: python build/build_asset_01_task_map.py
      - name: Fail if validation fails
        run: |
          test -f build/output/supplemental-assets/validation/Asset-01_Validation_v1.0.md
          ! grep -q 'Status: Fail' build/output/supplemental-assets/validation/Asset-01_Validation_v1.0.md
      - name: Upload task map artifact
        uses: actions/upload-artifact@v4
        with:
          name: classic-outlook-asset-01-task-map
          path: |
            build/output/supplemental-assets/01-task-map/**
            build/output/supplemental-assets/validation/Asset-01_*.md
            build/output/supplemental-assets/validation/Asset-01_*.csv
